# Representative legacy credential fields accepted by the version 5 contract.
version = 5
default_service = "codex"

[codex.providers.inline]
base_url = "https://inline.example/v1"
auth_token = "fixture-inline-token"
auth_token_env = "FIXTURE_INLINE_ENV"

[codex.providers.environment]
base_url = "https://environment.example/v1"
auth_token_env = "FIXTURE_RELAY_TOKEN"

[claude.providers.environment]
base_url = "https://claude.example/v1"
api_key_env = "FIXTURE_CLAUDE_KEY"
