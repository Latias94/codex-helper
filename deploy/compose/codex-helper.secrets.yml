services:
  codex-helper:
    environment:
      OPENAI_API_KEY: ""
    volumes:
      - type: bind
        source: ../container/config.secrets.toml
        target: /config/config.toml
        read_only: true
        bind:
          create_host_path: false
      - codex-helper-secret-data:/data
    secrets:
      - source: openai_api_key
        target: openai_api_key

secrets:
  openai_api_key:
    file: ${CODEX_HELPER_OPENAI_SECRET_FILE:?set CODEX_HELPER_OPENAI_SECRET_FILE to an absolute host path}

volumes:
  codex-helper-secret-data:
