version = 6

[codex.providers.openai]
base_url = "https://api.openai.com/v1"
auth_token_ref = { source = "secret_file", path = "/run/secrets/openai_api_key" }
tags = { billing = "paygo", deployment = "container-secret" }

[codex.routing]
entry = "main"

[codex.routing.routes.main]
strategy = "ordered-failover"
children = ["openai"]

[retry]
profile = "balanced"
