[workspace]
members = ["cargo:."]
packages = ["codex-helper"]

# Config for 'dist'
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.32.0"
# Build only the required packages, and individually
precise-builds = true
# CI backends to support
ci = "github"
# The installers to generate for each app
installers = ["shell", "powershell"]
# Target platforms to build apps for (Rust target-triple syntax)
targets = ["aarch64-apple-darwin", "x86_64-apple-darwin", "x86_64-unknown-linux-gnu", "x86_64-pc-windows-msvc"]
# Which actions to run on pull requests
pr-run-mode = "plan"
# Consume local artifacts and block the built-in host/release job on real service checks.
global-artifacts-jobs = ["./native-credential-smoke"]
github-custom-job-permissions = { "native-credential-smoke" = { actions = "read", contents = "read" } }
# Path that installers should place binaries in
install-path = "CARGO_HOME"
# Whether to install an updater program
install-updater = false

[dist.dependencies.apt]
"pkg-config" = "*"
"libssl-dev" = "*"
"libpango1.0-dev" = "*"
"libgtk-3-dev" = "*"
"libwebkit2gtk-4.1-dev" = "*"
"librsvg2-dev" = "*"
"libayatana-appindicator3-dev" = "*"
"libxdo-dev" = "*"
