name: CI

permissions:
  contents: read

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: fmt + clippy
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          # The real v0.20.3 downgrade gate archives its pinned historical loader.
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install cargo-dist
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-dist@0.32.0

      - name: Install Linux desktop dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libssl-dev \
            libpango1.0-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev \
            libxdo-dev

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.25.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: apps/desktop/pnpm-lock.yaml

      - name: Install desktop dependencies
        run: pnpm --dir apps/desktop install --frozen-lockfile

      - name: Prepare Tauri sidecar
        run: node apps/desktop/scripts/prepare-sidecar.mjs

      - name: Check desktop version sync
        run: pnpm --dir apps/desktop check:versions

      - name: Check desktop contracts
        run: pnpm --dir apps/desktop check:contracts

      - name: Check canonical runtime source surface
        run: node tools/check-canonical-runtime-surface.mjs

      - name: Check credential source and dependency surface
        run: node tools/check-credential-surface.mjs

      - name: Check generated cargo-dist workflow
        run: dist generate --mode=ci --check

      - name: Test native credential smoke safeguards
        run: |
          node tools/native-credential-smoke.mjs --self-test
          node tools/verify-native-credential-evidence.mjs --self-test

      - name: Test desktop
        run: pnpm --dir apps/desktop test -- --run

      - name: Build desktop frontend
        run: pnpm --dir apps/desktop build

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --locked --workspace --all-targets -- -D warnings

      - name: Verify v0.20.3 downgrade boundary
        run: node tools/check-v5-loader-downgrade.mjs

  test-build:
    name: test-build (${{ matrix.os }})
    needs: lint
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - macos-15
          - windows-2025

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false

      - name: Check Windows core before sidecar
        if: runner.os == 'Windows'
        run: cargo check --locked -p codex-helper-core --lib

      - name: Install Linux desktop dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libssl-dev \
            libpango1.0-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev \
            libxdo-dev

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Prepare Tauri sidecar
        run: node apps/desktop/scripts/prepare-sidecar.mjs

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Verify Rust tools
        run: |
          cargo --version
          cargo nextest --version

      - name: Check native credential core for this platform
        run: cargo check --locked -p codex-helper-core --features native-credentials --all-targets

      - name: Build isolated server artifact
        run: cargo build --locked -p codex-helper-server --target-dir target/server-isolated

      - name: Test server capability under workspace feature unification
        run: >-
          cargo nextest run --locked --workspace
          -E 'test(server_runtime_forbids_native_credentials_under_feature_unification)'

      - name: Test (nextest)
        run: cargo nextest run --locked --workspace --no-fail-fast

      - name: Build (release)
        run: cargo build --release --locked --workspace
