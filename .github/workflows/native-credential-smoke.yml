name: Native Credential Service Smoke

permissions:
  actions: read
  checks: read
  contents: read
  deployments: read

on:
  workflow_call:
    inputs:
      plan:
        description: "cargo-dist release plan for the current workflow"
        required: true
        type: string
  workflow_dispatch:
    inputs:
      artifact_run_id:
        description: "Release workflow run containing cargo-dist artifacts"
        required: true
        type: string
      candidate_sha:
        description: "Full commit SHA used to build those artifacts"
        required: true
        type: string

jobs:
  verify-release-protection:
    name: Verify protected native release environments
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Require environment reviewers
        uses: actions/github-script@v8
        with:
          script: |
            for (const environmentName of [
              "native-credential-smoke-execution",
              "native-credential-release",
            ]) {
              let environment;
              try {
                const response = await github.request(
                  "GET /repos/{owner}/{repo}/environments/{environment_name}",
                  {
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    environment_name: environmentName,
                  },
                );
                environment = response.data;
              } catch (error) {
                core.setFailed(
                  `Required protected environment ${environmentName} is unavailable: ${error.status ?? "unknown"}`,
                );
                continue;
              }
              const reviewerRule = (environment.protection_rules ?? []).find(
                (rule) =>
                  rule.type === "required_reviewers" &&
                  rule.prevent_self_review === true &&
                  (rule.reviewers ?? []).length > 0,
              );
              if (!reviewerRule) {
                core.setFailed(
                  `Environment ${environmentName} must configure at least one required reviewer and prevent self-review`,
                );
              }
            }

      - name: Require successful candidate CI
        uses: actions/github-script@v8
        env:
          EXPECTED_CANDIDATE_SHA: ${{ github.event_name == 'workflow_dispatch' && inputs.candidate_sha || github.sha }}
        with:
          script: |
            const candidateSha = process.env.EXPECTED_CANDIDATE_SHA?.toLowerCase();
            if (!/^[0-9a-f]{40}$/.test(candidateSha ?? "")) {
              core.setFailed("Expected candidate SHA is invalid");
              return;
            }
            const workflowRuns = await github.paginate(
              github.rest.actions.listWorkflowRuns,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: "ci.yml",
                head_sha: candidateSha,
                status: "completed",
                per_page: 100,
              },
            );
            const seenRunIds = new Set();
            const completedRuns = [];
            for (const run of workflowRuns) {
              if (!Number.isSafeInteger(run.id) || seenRunIds.has(run.id)) {
                core.setFailed("Candidate CI query returned an invalid or duplicate workflow run");
                return;
              }
              seenRunIds.add(run.id);
              if (
                run.status !== "completed" ||
                run.head_sha?.toLowerCase() !== candidateSha ||
                !Number.isSafeInteger(run.run_number) ||
                !Number.isSafeInteger(run.run_attempt) ||
                !Number.isSafeInteger(run.check_suite_id)
              ) {
                core.setFailed(
                  `Candidate CI query returned malformed workflow run ${run.id}`,
                );
                return;
              }
              completedRuns.push(run);
            }
            if (completedRuns.length === 0) {
              core.setFailed(`Candidate ${candidateSha} has no completed ci.yml workflow run`);
              return;
            }
            const compareWorkflowRunsNewestFirst = (left, right) =>
              right.run_number - left.run_number ||
              right.run_attempt - left.run_attempt ||
              right.id - left.id;
            completedRuns.sort(compareWorkflowRunsNewestFirst);
            const latestRun = completedRuns[0];
            const latestRankRuns = completedRuns.filter(
              (run) =>
                run.run_number === latestRun.run_number &&
                run.run_attempt === latestRun.run_attempt,
            );
            if (latestRankRuns.length !== 1) {
              core.setFailed("Candidate CI query did not identify a unique latest workflow run");
              return;
            }
            if (latestRun.conclusion !== "success") {
              core.setFailed(
                `Latest ci.yml workflow run ${latestRun.id} for ${candidateSha} concluded ${latestRun.conclusion ?? "without a conclusion"}`,
              );
              return;
            }
            const checkRuns = await github.paginate(github.rest.checks.listForSuite, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              check_suite_id: latestRun.check_suite_id,
              per_page: 100,
            });
            for (const requiredName of [
              "fmt + clippy",
              "test-build (ubuntu-24.04)",
              "test-build (macos-15)",
              "test-build (windows-2025)",
            ]) {
              const matchingRuns = checkRuns.filter(
                (run) =>
                  run.name === requiredName &&
                  run.head_sha?.toLowerCase() === candidateSha &&
                  run.check_suite?.id === latestRun.check_suite_id,
              );
              if (matchingRuns.length !== 1) {
                core.setFailed(
                  `CI workflow run ${latestRun.id} has ${matchingRuns.length} matching ${requiredName} check runs in suite ${latestRun.check_suite_id}`,
                );
                continue;
              }
              const [checkRun] = matchingRuns;
              if (checkRun.status !== "completed" || checkRun.conclusion !== "success") {
                core.setFailed(
                  `CI workflow run ${latestRun.id} check ${requiredName} concluded ${checkRun.conclusion ?? checkRun.status ?? "without a conclusion"}`,
                );
              }
            }

  release-prerequisites:
    name: Migration and Docker credential gates
    needs: verify-release-protection
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Check out release candidate
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.candidate_sha || github.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Verify migration, restore, and credential boundaries
        run: |
          node tools/check-v5-loader-downgrade.mjs
          node tools/check-credential-surface.mjs

      - name: Build isolated server image
        run: docker build --target runtime -t codex-helper-server:release-gate .

      - name: Verify environment and mounted-secret deployments
        run: bash tools/docker-mounted-secret-smoke.sh codex-helper-server:release-gate

  native-service-smoke:
    name: ${{ matrix.backend }} service context
    needs: release-prerequisites
    environment: native-credential-smoke-execution
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - backend: windows-credential-manager
            runner: '["self-hosted","Windows","X64","codex-helper-native-smoke"]'
            archive: codex-helper-x86_64-pc-windows-msvc.zip
          - backend: macos-keychain
            runner: '["self-hosted","macOS","ARM64","codex-helper-native-smoke"]'
            archive: codex-helper-aarch64-apple-darwin.tar.xz
          - backend: gnome-keyring
            runner: '["self-hosted","Linux","X64","codex-helper-native-smoke","gnome-keyring"]'
            archive: codex-helper-x86_64-unknown-linux-gnu.tar.xz
          - backend: kwallet
            runner: '["self-hosted","Linux","X64","codex-helper-native-smoke","kwallet"]'
            archive: codex-helper-x86_64-unknown-linux-gnu.tar.xz
    concurrency:
      group: native-credential-service-smoke-${{ matrix.backend }}
      cancel-in-progress: false
    runs-on: ${{ fromJSON(matrix.runner) }}
    steps:
      - name: Check out release candidate
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.candidate_sha || github.sha }}
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Verify artifact run identity
        uses: actions/github-script@v8
        env:
          ARTIFACT_RUN_ID: ${{ github.event_name == 'workflow_dispatch' && inputs.artifact_run_id || github.run_id }}
          EXPECTED_CANDIDATE_SHA: ${{ github.event_name == 'workflow_dispatch' && inputs.candidate_sha || github.sha }}
        with:
          script: |
            const runId = Number.parseInt(process.env.ARTIFACT_RUN_ID, 10);
            const expectedSha = process.env.EXPECTED_CANDIDATE_SHA?.toLowerCase();
            if (!Number.isSafeInteger(runId) || !/^[0-9a-f]{40}$/.test(expectedSha ?? "")) {
              core.setFailed("Artifact run id or expected candidate SHA is invalid");
              return;
            }
            const { data } = await github.rest.actions.getWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: runId,
            });
            if (data.head_sha.toLowerCase() !== expectedSha) {
              core.setFailed(
                `Artifact run ${runId} belongs to ${data.head_sha}, not ${expectedSha}`,
              );
            }

      - name: Download current release artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          pattern: artifacts-build-local-*
          path: native-smoke-artifacts
          merge-multiple: true
          run-id: ${{ github.event_name == 'workflow_dispatch' && inputs.artifact_run_id || github.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify and extract Unix candidate
        if: runner.os != 'Windows'
        id: unix-candidate
        shell: bash
        env:
          ARCHIVE_NAME: ${{ matrix.archive }}
        run: |
          set -euo pipefail
          archive="$(find native-smoke-artifacts -type f -name "$ARCHIVE_NAME" -print -quit)"
          test -n "$archive"
          test -f "$archive.sha256"

          expected="$(awk '{ print tolower($1) }' "$archive.sha256")"
          if command -v sha256sum >/dev/null 2>&1; then
            actual="$(sha256sum "$archive" | awk '{ print tolower($1) }')"
          else
            actual="$(shasum -a 256 "$archive" | awk '{ print tolower($1) }')"
          fi
          test "$actual" = "$expected"

          top_level="${ARCHIVE_NAME%.tar.xz}"
          entry_count=0
          binary_count=0
          ch_count=0
          while IFS= read -r entry; do
            normalized="${entry#./}"
            case "$normalized" in
              "$top_level"|"$top_level/"|"$top_level/"*) ;;
              *)
                echo "Unexpected archive entry outside $top_level: $entry" >&2
                exit 1
                ;;
            esac
            case "/$normalized/" in
              *"/../"*)
                echo "Archive entry contains parent traversal: $entry" >&2
                exit 1
                ;;
            esac
            test "$normalized" != "$top_level/codex-helper" || binary_count=$((binary_count + 1))
            test "$normalized" != "$top_level/ch" || ch_count=$((ch_count + 1))
            entry_count=$((entry_count + 1))
          done < <(tar -tJf "$archive")
          test "$entry_count" -gt 0
          test "$binary_count" -eq 1
          test "$ch_count" -eq 1

          mkdir native-smoke-bin
          tar -xJf "$archive" -C native-smoke-bin
          test -d "native-smoke-bin/$top_level"
          test ! -L "native-smoke-bin/$top_level"
          test -f "native-smoke-bin/$top_level/codex-helper"
          test ! -L "native-smoke-bin/$top_level/codex-helper"
          test -f "native-smoke-bin/$top_level/ch"
          test ! -L "native-smoke-bin/$top_level/ch"
          chmod +x "native-smoke-bin/$top_level/codex-helper" "native-smoke-bin/$top_level/ch"
          binary="$(cd "native-smoke-bin/$top_level" && pwd)/codex-helper"
          ch_binary="$(cd "native-smoke-bin/$top_level" && pwd)/ch"
          test -x "$binary"
          test -x "$ch_binary"
          "$binary" --version
          "$ch_binary" --version
          {
            echo "binary=$binary"
            echo "sha256=$actual"
          } >>"$GITHUB_OUTPUT"

      - name: Verify and extract Windows candidate
        if: runner.os == 'Windows'
        id: windows-candidate
        shell: pwsh
        env:
          ARCHIVE_NAME: ${{ matrix.archive }}
        run: |
          $ErrorActionPreference = "Stop"
          $archives = @(Get-ChildItem native-smoke-artifacts -Recurse -File -Filter $env:ARCHIVE_NAME)
          if ($archives.Count -ne 1) { throw "Expected exactly one release archive $env:ARCHIVE_NAME, found $($archives.Count)" }
          $archive = $archives[0]
          $checksumPath = "$($archive.FullName).sha256"
          if (-not (Test-Path -LiteralPath $checksumPath -PathType Leaf)) { throw "Release checksum is missing" }

          $expected = ((Get-Content -LiteralPath $checksumPath -Raw).Trim() -split '\s+')[0].ToLowerInvariant()
          $actual = (Get-FileHash -LiteralPath $archive.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
          if ($actual -ne $expected) { throw "Release archive checksum mismatch" }

          Expand-Archive -LiteralPath $archive.FullName -DestinationPath native-smoke-bin
          $binaryItem = Get-Item -LiteralPath native-smoke-bin/codex-helper.exe
          $chItem = Get-Item -LiteralPath native-smoke-bin/ch.exe
          if (($binaryItem.Attributes -band [IO.FileAttributes]::ReparsePoint) -ne 0) { throw "codex-helper.exe must not be a reparse point" }
          if (($chItem.Attributes -band [IO.FileAttributes]::ReparsePoint) -ne 0) { throw "ch.exe must not be a reparse point" }
          $binary = $binaryItem.FullName
          $chBinary = $chItem.FullName
          & $binary --version
          if ($LASTEXITCODE -ne 0) { throw "codex-helper.exe --version failed" }
          & $chBinary --version
          if ($LASTEXITCODE -ne 0) { throw "ch.exe --version failed" }
          "binary=$binary" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "sha256=$actual" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Run Unix native credential service smoke
        if: runner.os != 'Windows'
        shell: bash
        env:
          CODEX_HELPER_CANDIDATE_ARCHIVE_SHA256: ${{ steps.unix-candidate.outputs.sha256 }}
          CODEX_HELPER_CANDIDATE_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.candidate_sha || github.ref }}
          CODEX_HELPER_CANDIDATE_SHA: ${{ github.event_name == 'workflow_dispatch' && inputs.candidate_sha || github.sha }}
          CODEX_HELPER_NATIVE_SMOKE_ENVIRONMENT: native-credential-smoke-execution
        run: |
          set -euo pipefail
          mkdir -p native-credential-evidence
          node tools/native-credential-smoke.mjs \
            --binary '${{ steps.unix-candidate.outputs.binary }}' \
            --backend '${{ matrix.backend }}' \
            --evidence 'native-credential-evidence/${{ matrix.backend }}.json'

      - name: Run Windows native credential service smoke
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          CODEX_HELPER_CANDIDATE_ARCHIVE_SHA256: ${{ steps.windows-candidate.outputs.sha256 }}
          CODEX_HELPER_CANDIDATE_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.candidate_sha || github.ref }}
          CODEX_HELPER_CANDIDATE_SHA: ${{ github.event_name == 'workflow_dispatch' && inputs.candidate_sha || github.sha }}
          CODEX_HELPER_NATIVE_SMOKE_ENVIRONMENT: native-credential-smoke-execution
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -ItemType Directory -Force native-credential-evidence | Out-Null
          node tools/native-credential-smoke.mjs `
            --binary '${{ steps.windows-candidate.outputs.binary }}' `
            --backend '${{ matrix.backend }}' `
            --evidence 'native-credential-evidence/${{ matrix.backend }}.json'

      - name: Upload redacted evidence
        id: evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: native-credential-evidence-${{ matrix.backend }}-${{ github.event_name == 'workflow_dispatch' && inputs.candidate_sha || github.sha }}
          path: native-credential-evidence/
          if-no-files-found: error
          retention-days: 90

      - name: Record Unix evidence digest
        if: runner.os != 'Windows'
        shell: bash
        run: |
          {
            echo "### Native credential release evidence"
            echo
            echo "- Backend: \`${{ matrix.backend }}\`"
            echo "- Candidate: \`${{ github.event_name == 'workflow_dispatch' && inputs.candidate_sha || github.sha }}\`"
            echo "- Artifact digest: \`${{ steps.evidence.outputs.artifact-digest }}\`"
            echo "- Execution environment: \`native-credential-smoke-execution\`"
          } >>"$GITHUB_STEP_SUMMARY"

      - name: Record Windows evidence digest
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          @"
          ### Native credential release evidence

          - Backend: ${{ matrix.backend }}
          - Candidate: ${{ github.event_name == 'workflow_dispatch' && inputs.candidate_sha || github.sha }}
          - Artifact digest: ${{ steps.evidence.outputs.artifact-digest }}
          - Execution environment: native-credential-smoke-execution
          "@ | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append

  native-evidence-signoff:
    name: Review native credential evidence
    needs: native-service-smoke
    environment: native-credential-release
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out release candidate
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.candidate_sha || github.sha }}
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Download platform evidence
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          pattern: native-credential-evidence-*-${{ github.event_name == 'workflow_dispatch' && inputs.candidate_sha || github.sha }}
          path: native-credential-evidence-review
          merge-multiple: true

      - name: Verify complete platform evidence
        run: |
          node tools/verify-native-credential-evidence.mjs \
            --directory native-credential-evidence-review \
            --candidate-sha '${{ github.event_name == 'workflow_dispatch' && inputs.candidate_sha || github.sha }}' \
            --output native-credential-release-signoff.json

      - name: Record release signoff
        run: |
          {
            echo "### Native credential release signoff"
            echo
            echo "- Candidate: \`${{ github.event_name == 'workflow_dispatch' && inputs.candidate_sha || github.sha }}\`"
            echo "- Approval environment: \`native-credential-release\`"
            echo "- Reviewer identity: GitHub environment deployment history"
            echo "- Evidence contract: release-complete assurance required; schema v1 runtime smoke is diagnostic-only"
          } >>"$GITHUB_STEP_SUMMARY"

      - name: Upload release signoff manifest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: artifacts-native-credential-release-signoff-${{ github.event_name == 'workflow_dispatch' && inputs.candidate_sha || github.sha }}
          path: native-credential-release-signoff.json
          if-no-files-found: error
          retention-days: 90
