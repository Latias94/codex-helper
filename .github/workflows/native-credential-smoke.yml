name: Native Credential Service Smoke

permissions:
  actions: read
  contents: read

on:
  workflow_call:
    inputs:
      plan:
        description: "cargo-dist release plan for the current workflow"
        required: true
        type: string
  workflow_dispatch:
    inputs:
      artifact_run_id:
        description: "Release workflow run containing cargo-dist artifacts"
        required: true
        type: string
      candidate_sha:
        description: "Full commit SHA used to build those artifacts"
        required: true
        type: string

jobs:
  native-service-smoke:
    name: ${{ matrix.backend }} service context
    environment: native-credential-smoke-execution
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - backend: windows-credential-manager
            runner: '["self-hosted","Windows","X64","codex-helper-native-smoke"]'
            archive: codex-helper-x86_64-pc-windows-msvc.zip
          - backend: macos-keychain
            runner: '["self-hosted","macOS","ARM64","codex-helper-native-smoke"]'
            archive: codex-helper-aarch64-apple-darwin.tar.xz
          - backend: gnome-keyring
            runner: '["self-hosted","Linux","X64","codex-helper-native-smoke","gnome-keyring"]'
            archive: codex-helper-x86_64-unknown-linux-gnu.tar.xz
          - backend: kwallet
            runner: '["self-hosted","Linux","X64","codex-helper-native-smoke","kwallet"]'
            archive: codex-helper-x86_64-unknown-linux-gnu.tar.xz
    concurrency:
      group: native-credential-service-smoke-${{ matrix.backend }}
      cancel-in-progress: false
    runs-on: ${{ fromJSON(matrix.runner) }}
    steps:
      - name: Check out release candidate
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.candidate_sha || github.sha }}
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Verify artifact run identity
        uses: actions/github-script@v8
        env:
          ARTIFACT_RUN_ID: ${{ github.event_name == 'workflow_dispatch' && inputs.artifact_run_id || github.run_id }}
          EXPECTED_CANDIDATE_SHA: ${{ github.event_name == 'workflow_dispatch' && inputs.candidate_sha || github.sha }}
        with:
          script: |
            const runId = Number.parseInt(process.env.ARTIFACT_RUN_ID, 10);
            const expectedSha = process.env.EXPECTED_CANDIDATE_SHA?.toLowerCase();
            if (!Number.isSafeInteger(runId) || !/^[0-9a-f]{40}$/.test(expectedSha ?? "")) {
              core.setFailed("Artifact run id or expected candidate SHA is invalid");
              return;
            }
            const { data } = await github.rest.actions.getWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: runId,
            });
            if (data.head_sha.toLowerCase() !== expectedSha) {
              core.setFailed(
                `Artifact run ${runId} belongs to ${data.head_sha}, not ${expectedSha}`,
              );
            }

      - name: Download current release artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: artifacts-build-local-*
          path: native-smoke-artifacts
          merge-multiple: true
          run-id: ${{ github.event_name == 'workflow_dispatch' && inputs.artifact_run_id || github.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify and extract Unix candidate
        if: runner.os != 'Windows'
        id: unix-candidate
        shell: bash
        env:
          ARCHIVE_NAME: ${{ matrix.archive }}
        run: |
          set -euo pipefail
          archive="$(find native-smoke-artifacts -type f -name "$ARCHIVE_NAME" -print -quit)"
          test -n "$archive"
          test -f "$archive.sha256"

          expected="$(awk '{ print tolower($1) }' "$archive.sha256")"
          if command -v sha256sum >/dev/null 2>&1; then
            actual="$(sha256sum "$archive" | awk '{ print tolower($1) }')"
          else
            actual="$(shasum -a 256 "$archive" | awk '{ print tolower($1) }')"
          fi
          test "$actual" = "$expected"

          mkdir native-smoke-bin
          tar -xJf "$archive" -C native-smoke-bin
          chmod +x native-smoke-bin/codex-helper
          binary="$(cd native-smoke-bin && pwd)/codex-helper"
          test -x "$binary"
          {
            echo "binary=$binary"
            echo "sha256=$actual"
          } >>"$GITHUB_OUTPUT"

      - name: Verify and extract Windows candidate
        if: runner.os == 'Windows'
        id: windows-candidate
        shell: pwsh
        env:
          ARCHIVE_NAME: ${{ matrix.archive }}
        run: |
          $ErrorActionPreference = "Stop"
          $archive = Get-ChildItem native-smoke-artifacts -Recurse -File -Filter $env:ARCHIVE_NAME | Select-Object -First 1
          if (-not $archive) { throw "Release archive $env:ARCHIVE_NAME is missing" }
          $checksumPath = "$($archive.FullName).sha256"
          if (-not (Test-Path -LiteralPath $checksumPath -PathType Leaf)) { throw "Release checksum is missing" }

          $expected = ((Get-Content -LiteralPath $checksumPath -Raw).Trim() -split '\s+')[0].ToLowerInvariant()
          $actual = (Get-FileHash -LiteralPath $archive.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
          if ($actual -ne $expected) { throw "Release archive checksum mismatch" }

          Expand-Archive -LiteralPath $archive.FullName -DestinationPath native-smoke-bin
          $binary = (Resolve-Path native-smoke-bin/codex-helper.exe).Path
          "binary=$binary" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "sha256=$actual" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Run Unix native credential service smoke
        if: runner.os != 'Windows'
        shell: bash
        env:
          CODEX_HELPER_CANDIDATE_ARCHIVE_SHA256: ${{ steps.unix-candidate.outputs.sha256 }}
          CODEX_HELPER_CANDIDATE_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.candidate_sha || github.ref }}
          CODEX_HELPER_CANDIDATE_SHA: ${{ github.event_name == 'workflow_dispatch' && inputs.candidate_sha || github.sha }}
          CODEX_HELPER_NATIVE_SMOKE_ENVIRONMENT: native-credential-smoke-execution
        run: |
          set -euo pipefail
          mkdir -p native-credential-evidence
          node tools/native-credential-smoke.mjs \
            --binary '${{ steps.unix-candidate.outputs.binary }}' \
            --backend '${{ matrix.backend }}' \
            --evidence 'native-credential-evidence/${{ matrix.backend }}.json'

      - name: Run Windows native credential service smoke
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          CODEX_HELPER_CANDIDATE_ARCHIVE_SHA256: ${{ steps.windows-candidate.outputs.sha256 }}
          CODEX_HELPER_CANDIDATE_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.candidate_sha || github.ref }}
          CODEX_HELPER_CANDIDATE_SHA: ${{ github.event_name == 'workflow_dispatch' && inputs.candidate_sha || github.sha }}
          CODEX_HELPER_NATIVE_SMOKE_ENVIRONMENT: native-credential-smoke-execution
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -ItemType Directory -Force native-credential-evidence | Out-Null
          node tools/native-credential-smoke.mjs `
            --binary '${{ steps.windows-candidate.outputs.binary }}' `
            --backend '${{ matrix.backend }}' `
            --evidence 'native-credential-evidence/${{ matrix.backend }}.json'

      - name: Upload redacted evidence
        id: evidence
        uses: actions/upload-artifact@v7
        with:
          name: native-credential-evidence-${{ matrix.backend }}-${{ github.event_name == 'workflow_dispatch' && inputs.candidate_sha || github.sha }}
          path: native-credential-evidence/
          if-no-files-found: error
          retention-days: 90

      - name: Record Unix evidence digest
        if: runner.os != 'Windows'
        shell: bash
        run: |
          {
            echo "### Native credential release evidence"
            echo
            echo "- Backend: \`${{ matrix.backend }}\`"
            echo "- Candidate: \`${{ github.event_name == 'workflow_dispatch' && inputs.candidate_sha || github.sha }}\`"
            echo "- Artifact digest: \`${{ steps.evidence.outputs.artifact-digest }}\`"
            echo "- Execution environment: \`native-credential-smoke-execution\`"
          } >>"$GITHUB_STEP_SUMMARY"

      - name: Record Windows evidence digest
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          @"
          ### Native credential release evidence

          - Backend: ${{ matrix.backend }}
          - Candidate: ${{ github.event_name == 'workflow_dispatch' && inputs.candidate_sha || github.sha }}
          - Artifact digest: ${{ steps.evidence.outputs.artifact-digest }}
          - Execution environment: native-credential-smoke-execution
          "@ | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append

  native-evidence-signoff:
    name: Review native credential evidence
    needs: native-service-smoke
    environment: native-credential-release
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out release candidate
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.candidate_sha || github.sha }}
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Download platform evidence
        uses: actions/download-artifact@v8
        with:
          pattern: native-credential-evidence-*-${{ github.event_name == 'workflow_dispatch' && inputs.candidate_sha || github.sha }}
          path: native-credential-evidence-review
          merge-multiple: true

      - name: Verify and bind platform evidence
        run: |
          mkdir -p native-credential-release-signoff
          node tools/verify-native-credential-evidence.mjs \
            --directory native-credential-evidence-review \
            --candidate-sha '${{ github.event_name == 'workflow_dispatch' && inputs.candidate_sha || github.sha }}' \
            --output native-credential-release-signoff/signoff.json

      - name: Upload release signoff manifest
        id: signoff
        uses: actions/upload-artifact@v7
        with:
          name: native-credential-release-signoff-${{ github.event_name == 'workflow_dispatch' && inputs.candidate_sha || github.sha }}
          path: native-credential-release-signoff/
          if-no-files-found: error
          retention-days: 90

      - name: Record release signoff
        run: |
          {
            echo "### Native credential release signoff"
            echo
            echo "- Candidate: \`${{ github.event_name == 'workflow_dispatch' && inputs.candidate_sha || github.sha }}\`"
            echo "- Signoff artifact digest: \`${{ steps.signoff.outputs.artifact-digest }}\`"
            echo "- Approval environment: \`native-credential-release\`"
            echo "- Reviewer identity: GitHub environment deployment history"
          } >>"$GITHUB_STEP_SUMMARY"
